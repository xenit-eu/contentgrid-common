plugins {
    id 'java-library'
    id 'maven-publish'
}

project.description = "Library applying inhouse fixes and opinions to spring boot services in the Contentgrid stack"

ext.features = ["springBoot3", "springBoot4"]

features.each { String name ->
    def mainSourceSet = sourceSets.create(name) {
        java {
            srcDir 'src/shared/java'
        }
        resources {
            srcDir 'src/shared/resources'
        }
    }
    java.registerFeature(name) {
        usingSourceSet(mainSourceSet)
        capability("com.contentgrid.common", "spring-boot", version.toString())
        def kebabCased = name.replaceAll(/([A-Z])/, '-$1').replaceAll(/([a-zA-Z])(\d)/, '$1-$2').toLowerCase()
        capability("com.contentgrid.common", kebabCased, version.toString())
        withJavadocJar()
        withSourcesJar()
    }

    tasks.named("assemble") {
        dependsOn(tasks.named(mainSourceSet.jarTaskName))
    }

    def testSourceSet = sourceSets.create("${name}Test") {
        java {
            srcDir 'src/sharedTest/java'
        }
        resources {
            srcDir 'src/sharedTest/resources'
        }
        compileClasspath += mainSourceSet.output
        runtimeClasspath += mainSourceSet.output
    }

    configurations[testSourceSet.implementationConfigurationName].extendsFrom(configurations[mainSourceSet.implementationConfigurationName])
    configurations[testSourceSet.compileOnlyConfigurationName].extendsFrom(configurations[mainSourceSet.compileOnlyConfigurationName])
    configurations[testSourceSet.runtimeOnlyConfigurationName].extendsFrom(configurations[mainSourceSet.runtimeOnlyConfigurationName])

    tasks.register("${name}Test", Test) {
        description = "Runs tests for ${name}"
        group = "verification"
        testClassesDirs = testSourceSet.output.classesDirs
        classpath = testSourceSet.runtimeClasspath
        useJUnitPlatform()
    }

    tasks.named('check').configure {
        dependsOn("${name}Test")
    }
}

def createConfiguration(String name) {
    var commonConfig = configurations.create("common${name.capitalize()}") {
        canBeConsumed = false
        canBeResolved = false
        canBeDeclared = true
    }
    features.each {
        configurations.named("${it}${name.capitalize()}").configure {
            extendsFrom(commonConfig)
        }
    }
}

createConfiguration("implementation")
createConfiguration("compileOnly")
createConfiguration("testImplementation")
createConfiguration("testRuntimeOnly")


// Disable default tasks
tasks.named("jar") { enabled = false }
tasks.named("sourcesJar") { enabled = false }
tasks.named("javadocJar") { enabled = false }

components.java.withVariantsFromConfiguration(configurations.apiElements) { skip() }
components.java.withVariantsFromConfiguration(configurations.runtimeElements) { skip() }
components.java.withVariantsFromConfiguration(configurations.sourcesElements) { skip() }
components.java.withVariantsFromConfiguration(configurations.javadocElements) { skip() }

dependencies {
    springBoot3Implementation platform('org.springframework.boot:spring-boot-dependencies:3.5.14')
    springBoot4Implementation platform('org.springframework.boot:spring-boot-dependencies:4.0.6')

    commonImplementation 'org.springframework.boot:spring-boot-autoconfigure'
    commonImplementation project(':contentgrid-common-spring-actuators')

    // ActuatorEndpointsWebSecurityAutoConfiguration
    commonCompileOnly 'org.springframework.boot:spring-boot-actuator-autoconfigure'
    commonCompileOnly 'org.springframework.security:spring-security-web'
    commonCompileOnly 'org.springframework.security:spring-security-config'
    commonCompileOnly 'jakarta.servlet:jakarta.servlet-api'

    springBoot4CompileOnly 'org.springframework.boot:spring-boot-security'
    springBoot4CompileOnly 'org.springframework.boot:spring-boot-micrometer-metrics'
    springBoot4CompileOnly 'org.springframework.boot:spring-boot-health'
    springBoot4CompileOnly 'org.springframework.boot:spring-boot-actuator'

    // DisconnectedClientHandlingWebMvcAutoConfiguration
    commonCompileOnly 'org.springframework:spring-webmvc'

    springBoot4CompileOnly 'org.springframework.boot:spring-boot-webmvc'

    // Tests
    commonTestRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // Application dependencies
    commonTestImplementation 'org.springframework.boot:spring-boot-starter-security'
    commonTestImplementation 'org.springframework.boot:spring-boot-starter-actuator'

    springBoot3TestImplementation 'org.springframework.boot:spring-boot-starter-web'
    springBoot4TestImplementation 'org.springframework.boot:spring-boot-starter-webmvc'

    // Test utilities
    commonTestImplementation 'org.springframework.security:spring-security-test'
    commonTestImplementation 'org.springframework.boot:spring-boot-starter-test'

    springBoot4TestImplementation 'org.springframework.boot:spring-boot-webmvc-test'
}
